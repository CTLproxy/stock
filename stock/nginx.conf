server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    # Enable gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker — never cache
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Manifest
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # Grocy API proxy (for HA add-on → Grocy add-on internal routing)
    location /proxy/grocy/ {
        # __GROCY_PROXY_TARGET__ is replaced at runtime by run.sh
        proxy_pass __GROCY_PROXY_TARGET__;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Accept "application/json";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;

        # CORS headers so the PWA can call from browser
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, GROCY-API-KEY, Authorization" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
